<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>といて。- AI問題解答</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #2a2a3a;
    --accent: #7b5ea7;
    --accent2: #e8c547;
    --text: #e8e8f0;
    --muted: #666680;
    --success: #4ade80;
    --error: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(123,94,167,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(123,94,167,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* Header */
  header {
    padding: 40px 0 32px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .logo {
    font-size: 2.6rem;
    font-weight: 900;
    letter-spacing: -0.03em;
    color: var(--text);
  }

  .logo span {
    color: var(--accent2);
  }

  .tagline {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* Main layout */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  @media (max-width: 640px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .card-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-label .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Camera area */
  .camera-area {
    aspect-ratio: 4/3;
    position: relative;
    background: #070710;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #videoEl, #canvasEl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  #canvasEl { display: none; }

  .camera-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: var(--muted);
  }

  .camera-icon {
    width: 56px;
    height: 56px;
    border: 2px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .camera-placeholder p {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-align: center;
  }

  /* Scan line effect */
  .camera-area.active::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 2.5s linear infinite;
    pointer-events: none;
  }

  @keyframes scan {
    0% { top: 0; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }

  /* Corner decorations */
  .camera-area .corner {
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--accent2);
    border-style: solid;
    opacity: 0.6;
    z-index: 2;
  }
  .corner.tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

  /* Preview image */
  #previewImg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  /* Buttons */
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
  }

  .btn {
    padding: 14px;
    background: var(--surface);
    border: none;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn:hover { background: #1e1e2a; color: var(--accent2); }
  .btn:active { background: #252535; }

  .btn.primary {
    background: var(--accent);
    color: #fff;
    font-weight: 700;
  }

  .btn.primary:hover { background: #9070c0; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* File upload trigger */
  #fileInput { display: none; }

  /* Answer panel */
  .answer-panel {
    grid-column: 1 / -1;
    display: none;
  }

  .answer-panel.visible { display: block; }

  .answer-body {
    padding: 24px;
    min-height: 120px;
    line-height: 2;
    font-size: 0.95rem;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Loading */
  .loading-state {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 24px;
    color: var(--muted);
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
  }

  /* Typing cursor */
  .typing::after {
    content: '▊';
    color: var(--accent2);
    animation: blink 0.7s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  /* Subject selector */
  .subject-row {
    padding: 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }

  .subject-chip {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .subject-chip.active {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(232, 197, 71, 0.08);
  }

  /* Status badge */
  .status-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    padding: 3px 8px;
    border-radius: 2px;
    margin-left: auto;
  }
  .status-badge.ready { color: var(--success); border: 1px solid rgba(74,222,128,0.3); }
  .status-badge.error { color: var(--error); border: 1px solid rgba(248,113,113,0.3); }

  /* Copy button */
  .copy-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    padding: 6px 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    margin: 0 16px 16px;
  }

  .copy-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* Info row */
  .info-row {
    padding: 0 16px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* Empty state hint */
  .hint-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 16px 20px;
    margin-top: 24px;
    border-radius: 0 4px 4px 0;
  }

  .hint-card p {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    line-height: 1.8;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">と<span>い</span>て。</div>
    <div class="tagline">AI powered problem solver</div>
  </header>

  <div class="main-grid">
    <!-- Camera card -->
    <div class="card">
      <div class="card-label">
        <span class="dot"></span>
        撮影 / 画像選択
      </div>
      <div class="subject-row">
        <button class="subject-chip active" data-subject="auto">自動判別</button>
        <button class="subject-chip" data-subject="math">数学</button>
        <button class="subject-chip" data-subject="science">理科</button>
        <button class="subject-chip" data-subject="english">英語</button>
        <button class="subject-chip" data-subject="other">その他</button>
      </div>
      <div class="camera-area" id="cameraArea">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <video id="videoEl" autoplay playsinline></video>
        <canvas id="canvasEl"></canvas>
        <img id="previewImg" alt="preview">
        <div class="camera-placeholder" id="placeholder">
          <div class="camera-icon">📷</div>
          <p>カメラを起動するか<br>画像をアップロード</p>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn" id="startCamBtn">📷 カメラ</button>
        <button class="btn" id="uploadBtn">🖼 画像を選ぶ</button>
      </div>
      <div class="btn-row">
        <button class="btn" id="captureBtn" disabled>⚡ 撮影する</button>
        <button class="btn primary" id="solveBtn" disabled>✦ 解いて</button>
      </div>
      <input type="file" id="fileInput" accept="image/*">
    </div>

    <!-- Info card -->
    <div class="card" style="padding: 24px; display:flex; flex-direction:column; gap: 20px; justify-content: space-between;">
      <div>
        <div style="font-family:'Space Mono',monospace; font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-bottom:16px;">使い方</div>
        <div style="display:flex; flex-direction:column; gap:12px;">
          <div style="display:flex; gap:12px; align-items:flex-start;">
            <div style="font-family:'Space Mono',monospace; font-size:1.2rem; color:var(--accent2); flex-shrink:0; line-height:1;">01</div>
            <div style="font-size:0.85rem; line-height:1.7; color:var(--muted);">科目を選ぶ（自動判別もOK）</div>
          </div>
          <div style="display:flex; gap:12px; align-items:flex-start;">
            <div style="font-family:'Space Mono',monospace; font-size:1.2rem; color:var(--accent2); flex-shrink:0; line-height:1;">02</div>
            <div style="font-size:0.85rem; line-height:1.7; color:var(--muted);">カメラで撮影 or 画像を選択</div>
          </div>
          <div style="display:flex; gap:12px; align-items:flex-start;">
            <div style="font-family:'Space Mono',monospace; font-size:1.2rem; color:var(--accent2); flex-shrink:0; line-height:1;">03</div>
            <div style="font-size:0.85rem; line-height:1.7; color:var(--muted);">「解いて」ボタンを押すだけ</div>
          </div>
        </div>
      </div>
      <div>
        <div style="font-family:'Space Mono',monospace; font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-bottom:12px;">対応科目</div>
        <div style="font-size:0.8rem; line-height:2; color:var(--text);">
          数学・物理・化学・生物<br>
          英語・古文・現代文<br>
          社会・その他一般問題
        </div>
      </div>
      <div style="font-family:'Space Mono',monospace; font-size:0.6rem; color:var(--muted); line-height:1.8; letter-spacing:0.03em;">
        ※ 画像は解答生成にのみ使用<br>
        ※ Powered by Claude AI
      </div>
    </div>

    <!-- Answer panel -->
    <div class="card answer-panel" id="answerPanel">
      <div class="card-label">
        <span class="dot" style="background:var(--success)"></span>
        解答
        <span class="status-badge ready" id="statusBadge" style="display:none">DONE</span>
      </div>
      <div id="answerBody" class="answer-body">
        <div class="loading-state" id="loadingState" style="display:none">
          <div class="spinner"></div>
          <span class="loading-text">問題を読み取り中...</span>
        </div>
        <div id="answerText"></div>
      </div>
      <button class="copy-btn" id="copyBtn" style="display:none">コピー</button>
    </div>
  </div>

  <div class="hint-card">
    <p>
      // ノートやプリント、教科書の問題をそのまま撮影してOK<br>
      // 手書きの問題も読み取れます<br>
      // 解き方のステップも丁寧に説明します
    </p>
  </div>
</div>

<script>
  let stream = null;
  let capturedImageData = null;
  let selectedSubject = '自動判別';
  const subjectMap = {
    auto: '自動判別',
    math: '数学',
    science: '理科・物理・化学・生物',
    english: '英語',
    other: 'その他'
  };

  const videoEl = document.getElementById('videoEl');
  const canvasEl = document.getElementById('canvasEl');
  const previewImg = document.getElementById('previewImg');
  const placeholder = document.getElementById('placeholder');
  const cameraArea = document.getElementById('cameraArea');
  const startCamBtn = document.getElementById('startCamBtn');
  const uploadBtn = document.getElementById('uploadBtn');
  const captureBtn = document.getElementById('captureBtn');
  const solveBtn = document.getElementById('solveBtn');
  const fileInput = document.getElementById('fileInput');
  const answerPanel = document.getElementById('answerPanel');
  const answerText = document.getElementById('answerText');
  const loadingState = document.getElementById('loadingState');
  const copyBtn = document.getElementById('copyBtn');
  const statusBadge = document.getElementById('statusBadge');

  // Subject chips
  document.querySelectorAll('.subject-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.subject-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      selectedSubject = subjectMap[chip.dataset.subject];
    });
  });

  // Start camera
  startCamBtn.addEventListener('click', async () => {
    try {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
      }
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
      videoEl.srcObject = stream;
      videoEl.style.display = 'block';
      previewImg.style.display = 'none';
      placeholder.style.display = 'none';
      cameraArea.classList.add('active');
      captureBtn.disabled = false;
      capturedImageData = null;
      solveBtn.disabled = true;
    } catch (e) {
      alert('カメラの起動に失敗しました。\nブラウザの設定でカメラの許可をしてください。');
    }
  });

  // Capture
  captureBtn.addEventListener('click', () => {
    if (!stream) return;
    const w = videoEl.videoWidth || 640;
    const h = videoEl.videoHeight || 480;
    canvasEl.width = w;
    canvasEl.height = h;
    const ctx = canvasEl.getContext('2d');
    ctx.drawImage(videoEl, 0, 0, w, h);
    capturedImageData = canvasEl.toDataURL('image/jpeg', 0.92).split(',')[1];
    previewImg.src = canvasEl.toDataURL('image/jpeg', 0.92);
    previewImg.style.display = 'block';
    videoEl.style.display = 'none';
    cameraArea.classList.remove('active');
    stream.getTracks().forEach(t => t.stop());
    stream = null;
    captureBtn.disabled = true;
    solveBtn.disabled = false;
  });

  // File upload
  uploadBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const dataUrl = ev.target.result;
      capturedImageData = dataUrl.split(',')[1];
      previewImg.src = dataUrl;
      previewImg.style.display = 'block';
      videoEl.style.display = 'none';
      placeholder.style.display = 'none';
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      cameraArea.classList.remove('active');
      captureBtn.disabled = true;
      solveBtn.disabled = false;
    };
    reader.readAsDataURL(file);
    fileInput.value = '';
  });

  // Solve
  solveBtn.addEventListener('click', async () => {
    if (!capturedImageData) return;
    answerPanel.classList.add('visible');
    loadingState.style.display = 'flex';
    answerText.textContent = '';
    answerText.classList.remove('typing');
    statusBadge.style.display = 'none';
    copyBtn.style.display = 'none';
    solveBtn.disabled = true;

    const subjectHint = selectedSubject !== '自動判別'
      ? `この問題は「${selectedSubject}」の問題です。`
      : '';

    const prompt = `${subjectHint}
添付の画像に写っている問題を解いてください。

以下の形式で丁寧に答えてください：
1. 問題の内容を確認（1〜2行）
2. 解き方・考え方の説明
3. 答え（明確に）

日本語で答えてください。`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: [
              {
                type: 'image',
                source: { type: 'base64', media_type: 'image/jpeg', data: capturedImageData }
              },
              { type: 'text', text: prompt }
            ]
          }]
        })
      });

      const data = await response.json();
      loadingState.style.display = 'none';

      if (data.content && data.content[0]) {
        const fullText = data.content[0].text;
        answerText.classList.add('typing');

        // Typewriter effect
        let i = 0;
        const speed = 18;
        const type = () => {
          if (i < fullText.length) {
            answerText.textContent += fullText[i];
            i++;
            setTimeout(type, speed);
          } else {
            answerText.classList.remove('typing');
            statusBadge.style.display = 'inline';
            copyBtn.style.display = 'inline-block';
            solveBtn.disabled = false;
          }
        };
        type();
      } else {
        answerText.textContent = '解答を取得できませんでした。もう一度お試しください。';
        solveBtn.disabled = false;
      }
    } catch (err) {
      loadingState.style.display = 'none';
      answerText.textContent = 'エラーが発生しました: ' + err.message;
      solveBtn.disabled = false;
    }
  });

  // Copy
  copyBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(answerText.textContent);
      copyBtn.textContent = 'コピーしました ✓';
      setTimeout(() => { copyBtn.textContent = 'コピー'; }, 1500);
    } catch {}
  });
</script>
</body>
</html>
